server {
    listen 80;
    server_name _;
    merge_slashes off;
    client_max_body_size 26214400;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        client_max_body_size 26214400;
        proxy_pass http://gateway:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /img/ {
        rewrite ^/img/(.*)$ /$1 break;
        proxy_pass http://thumbor:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/share/products/([0-9A-Za-z-]+)$ {
        proxy_pass http://gateway:80/api/products/$1/share/page;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/share/portfolio/([0-9A-Za-z-]+)/([0-9A-Za-z-]+)$ {
        proxy_pass http://gateway:80/api/artists/$1/portfolio/$2/share/page;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
