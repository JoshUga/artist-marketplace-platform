version: "3.8"

services:
  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth-service
      - artist-service
      - product-service
    networks:
      - marketplace-net
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: marketplace
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - marketplace-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - marketplace-net
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - SERVICE_NAME=auth-service
      - SERVICE_PORT=8001
      - DATABASE_URL=mysql+aiomysql://root:password@mysql:3306/marketplace
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=change-me-in-production
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - marketplace-net
    restart: unless-stopped

  # Artist Service
  artist-service:
    build:
      context: .
      dockerfile: services/artist/Dockerfile
    environment:
      - SERVICE_NAME=artist-service
      - SERVICE_PORT=8002
      - DATABASE_URL=mysql+aiomysql://root:password@mysql:3306/marketplace
      - JWT_SECRET_KEY=change-me-in-production
    ports:
      - "8002:8002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - marketplace-net
    restart: unless-stopped

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    environment:
      - SERVICE_NAME=product-service
      - SERVICE_PORT=8003
      - DATABASE_URL=mysql+aiomysql://root:password@mysql:3306/marketplace
      - JWT_SECRET_KEY=change-me-in-production
    ports:
      - "8003:8003"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - marketplace-net
    restart: unless-stopped

  # Frontend
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./services/frontend/public:/usr/share/nginx/html:ro
      - ./services/frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - marketplace-net
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  marketplace-net:
    driver: bridge
