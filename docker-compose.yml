#version: "3.8"

services:
  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      auth-service:
        condition: service_healthy
      artist-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      Base:
        aliases:
          - gateway.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: marketplace
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - Base
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - Base
    restart: unless-stopped

  # Dedicated PostgreSQL for Payram
  payram-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=payram
      - POSTGRES_USER=payram
      - POSTGRES_PASSWORD=payram123
    volumes:
      - payram-postgres-data:/var/lib/postgresql/data
    networks:
      - Base
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payram -d payram"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local SMTP sink for Payram email notifications
  mailpit:
    image: axllent/mailpit:latest
    networks:
      - Base
    restart: unless-stopped

  # Payram Payment Service
  payram:
    build:
      context: .
      dockerfile: payram-image/Dockerfile
    environment:
      - NEXT_PUBLIC_BACKEND_URL=/backend
      # Use Docker-internal routing for Payram -> backend API communication.
      - API_URL=http://gateway
      - AES_KEY=${PAYRAM_AES_KEY:-0123456789abcdef0123456789abcdef}
      - SSL_CERT_PATH=/root/payram/certs
      - BLOCKCHAIN_NETWORK_TYPE=Base
      - SERVER=DEVELOPMENT
      - POSTGRES_HOST=payram-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=payram
      - POSTGRES_USERNAME=payram
      - POSTGRES_PASSWORD=payram123
    volumes:
      - ./payram:/root/payram
      - ./payram-certs:/root/payram/certs:ro
      - ./payram/log/supervisord:/var/log
      - ./payram/db/postgres:/var/lib/payram/db/postgres
    networks:
      - Base
    restart: unless-stopped
    depends_on:
      payram-postgres:
        condition: service_healthy

  # Payram dashboard reverse proxy (same-origin frontend + API access on port 8081)
  payram-dashboard:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./payram-proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      payram:
        condition: service_started
    networks:
      - Base
    restart: unless-stopped

  # One-shot root user bootstrap for Payram (runs internally on Docker network)
  payram-root-init:
    image: curlimages/curl:8.7.1
    entrypoint: ["sh", "/bootstrap-root.sh"]
    environment:
      - PAYRAM_API_BASE_URL=https://payram:8443
      - PAYRAM_ROOT_EMAIL=${PAYRAM_ROOT_EMAIL:-daniel.tugume@kabitalventures.org}
      - PAYRAM_ROOT_PASSWORD=${PAYRAM_ROOT_PASSWORD:-Ttugumeddaniel@2001}
      - PAYRAM_BOOTSTRAP_MAX_ATTEMPTS=60
      - PAYRAM_SMTP_HOST=${PAYRAM_SMTP_HOST:-mailpit}
      - PAYRAM_SMTP_PORT=${PAYRAM_SMTP_PORT:-1025}
      - PAYRAM_SMTP_FROM_EMAIL=${PAYRAM_SMTP_FROM_EMAIL:-noreply@local.dev}
      - PAYRAM_SMTP_REPLY_TO_EMAIL=${PAYRAM_SMTP_REPLY_TO_EMAIL:-noreply@local.dev}
      - PAYRAM_SMTP_USERNAME=${PAYRAM_SMTP_USERNAME:-}
      - PAYRAM_SMTP_PASSWORD=${PAYRAM_SMTP_PASSWORD:-}
      - PAYRAM_SMTP_USE_TLS=${PAYRAM_SMTP_USE_TLS:-false}
      - PAYRAM_AUTO_CREATE_EVM_WALLETS=${PAYRAM_AUTO_CREATE_EVM_WALLETS:-true}
      - PAYRAM_EVM_NETWORK=${PAYRAM_EVM_NETWORK:-EVM}
      - PAYRAM_MASTER_WALLET_NAME=${PAYRAM_MASTER_WALLET_NAME:-EVM Master Wallet}
      - PAYRAM_COLD_WALLET_NAME=${PAYRAM_COLD_WALLET_NAME:-EVM Cold Wallet}
      - PAYRAM_WALLET_LIST_PATH=${PAYRAM_WALLET_LIST_PATH:-/api/v1/wallets}
      - PAYRAM_WALLET_CREATE_PATH=${PAYRAM_WALLET_CREATE_PATH:-/api/v1/wallets}
      - PAYRAM_REQUIRE_EVM_WALLETS=${PAYRAM_REQUIRE_EVM_WALLETS:-false}
    volumes:
      - ./payram/bootstrap-root.sh:/bootstrap-root.sh:ro
    depends_on:
      payram:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - Base
    restart: "no"

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - SERVICE_NAME=auth-service
      - SERVICE_PORT=8001
      - DATABASE_URL=mysql+aiomysql://root:password@mysql:3306/marketplace
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=change-me-in-production
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      payram:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - Base
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Artist Service
  artist-service:
    build:
      context: .
      dockerfile: services/artist/Dockerfile
    environment:
      - SERVICE_NAME=artist-service
      - SERVICE_PORT=8002
      - DATABASE_URL=mysql+aiomysql://root:password@mysql:3306/marketplace
      - JWT_SECRET_KEY=change-me-in-production
      - IMAGE_CDN_BASE_URL=/img/unsafe
      - IMAGE_ORIGIN_BASE_URL=http://gateway.local/media
      - ARTIST_MEDIA_DIR=/app/services/artist/media
    ports:
      - "8002:8002"
    volumes:
      - ./services/artist/media:/app/services/artist/media
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - Base
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Image CDN / edge-style transformation API
  thumbor:
    image: apsl/thumbor:latest
    ports:
      - "8888:8000"
    environment:
      - THUMBOR_NUM_PROCESSES=2
      - THUMBOR_USE_GIFS_ENGINE=False
      - THUMBOR_AUTO_WEBP=True
      - THUMBOR_QUALITY=85
      - THUMBOR_ALLOW_UNSAFE_URL=True
      - THUMBOR_ALLOWED_SOURCES=["gateway.local"]
    depends_on:
      artist-service:
        condition: service_healthy
    networks:
      - Base
    restart: unless-stopped

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    environment:
      - SERVICE_NAME=product-service
      - SERVICE_PORT=8003
      - DATABASE_URL=mysql+aiomysql://root:password@mysql:3306/marketplace
      - JWT_SECRET_KEY=change-me-in-production
      - PAYRAM_BASE_URL=http://payram:8080
      - PAYRAM_CHECKOUT_PATH=/payments/checkout
    ports:
      - "8003:8003"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - Base
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Frontend
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./services/frontend/public:/usr/share/nginx/html:ro
      - ./services/frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - Base
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  payram-postgres-data:

networks:
  Base:
    driver: bridge
