server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID" always;

    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Auth Service
    location /api/auth/ {
        set $auth_service auth-service:8001;
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass http://$auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Artist Service
    location /api/artists/ {
        set $artist_service artist-service:8002;
        rewrite ^/api/artists/(.*)$ /artists/$1 break;
        proxy_pass http://$artist_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Product Service
    location /api/products/ {
        set $product_service product-service:8003;
        rewrite ^/api/products/(.*)$ /products/$1 break;
        proxy_pass http://$product_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/categories/ {
        set $product_service product-service:8003;
        rewrite ^/api/categories/(.*)$ /categories/$1 break;
        proxy_pass http://$product_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks
    location /api/auth/health {
        set $auth_service auth-service:8001;
        proxy_pass http://$auth_service/health;
    }

    location /api/artists/health {
        set $artist_service artist-service:8002;
        proxy_pass http://$artist_service/health;
    }

    location /api/products/health {
        set $product_service product-service:8003;
        proxy_pass http://$product_service/health;
    }

    # Default
    location / {
        return 200 '{"status": "ok", "service": "api-gateway"}';
        add_header Content-Type application/json;
    }
}
